# Pantheon Base — golangci-lint configuration
# Run: golangci-lint run ./backend/...
version: "2"

run:
  go: "1.25"
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Default + extras
    - errcheck      # unchecked errors
    - gosimple      # simplify code
    - govet         # go vet
    - ineffassign   # ineffectual assignments
    - staticcheck   # static analysis
    - unused        # unused variables/imports
    - copyloopvar   # loop variable aliasing (Go 1.22+ fix)
    - gosec         # security checks
    - goconst       # repeated string literals → constants
    - revive        # drop-in golint replacement
    - misspell      # spelling in comments
    - unconvert     # unnecessary type conversions
    - prealloc      # slice preallocation
  disable:
    # Disable noisy/redundant linters
    - dupl          # handled by project-level check-duplication.mjs
    - stylecheck    # too strict for this codebase; use revive instead
    - nestif        # manageable
    - cyclop        # covered by gocyclo analysis
    - testpackage   # test files live next to source

formatters:
  enable:
    - gofmt         # format check
  settings:
    gofmt:
      simplify: true

linters-settings:
  gosec:
    severity: medium
    excludes:
      - G104  # errcheck already handles unchecked errors
      - G404  # crypto/rand not needed for non-secure random
  goconst:
    min-len: 5
    min-occurrences: 3
    ignore-tests: true
  revive:
    severity: warning
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: context-as-argument
        severity: warning
        disabled: false
        arguments:
          - allowTypesBefore: "*"
      - name: early-return
        severity: warning
      - name: indent-error-flow
        severity: warning
      - name: error-naming
        severity: warning
      - name: error-strings
        severity: warning
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (*database/sql.Rows).Close
      - (*database/sql.Stmt).Close
      - (*net/http.ResponseWriter).Write
      - (net/http.ResponseWriter).Write

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # Exclude test files from certain rules
    - path: _test\.go
      linters:
        - gosec
        - goconst
        - errcheck
    # Exclude generated code
    - path: generated_.*\.go
      linters:
        - all
    # Exclude migrations
    - path: migrate\.go
      linters:
        - gosec

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
  sort-results: true
