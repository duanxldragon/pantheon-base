name: CI

on:
  push:
    branches:
      - main
      - release/**
      - fix/**
      - feat/**
      - feature/**
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: backend/go.mod
  NODE_VERSION: "22"

jobs:
  # ============================================================
  # Phase 1: Fast Checks (< 2 min)
  # ============================================================
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Check Go formatting
        id: gofmt
        continue-on-error: true
        working-directory: backend
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted Go files:"
            echo "$UNFORMATTED"
            exit 1
          fi
          echo "Go formatting OK"

      - name: Enforce formatting gate
        shell: bash
        env:
          GOFMT_RESULT: ${{ steps.gofmt.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "gofmt: $GOFMT_RESULT"
          # PR/merge_group: report-only
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            echo "Go formatting is report-only for PR/merge_group"
            exit 0
          fi
          if [ "$GOFMT_RESULT" != "success" ]; then
            exit 1
          fi

      - name: Check Go vet
        working-directory: backend
        run: go vet ./...

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint check
        working-directory: frontend
        run: npx eslint src --max-warnings 0

  # ============================================================
  # Phase 2: Unit Tests
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Run Go tests
        working-directory: backend
        run: go test -race -short ./...

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run npm script tests
        run: npm ci && npm run test:docs-frontmatter

  # ============================================================
  # Phase 3: Lint (golangci-lint)
  # ============================================================
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.2

      - name: Run golangci-lint
        id: lint
        continue-on-error: true
        working-directory: backend
        run: golangci-lint run ./...

      - name: Handle lint results
        shell: bash
        env:
          LINT_RESULT: ${{ steps.lint.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "golangci-lint: $LINT_RESULT"
          
          # PR/merge_group: report-only until existing issues are remediated
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            echo "Lint is report-only for PR/merge_group"
            exit 0
          fi
          
          if [ "$LINT_RESULT" != "success" ]; then
            exit 1
          fi

  # ============================================================
  # Phase 4: Summary
  # ============================================================
  ci-summary:
    name: CI Summary
    needs: [fast-checks, unit-tests, go-lint]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate summary
        shell: bash
        env:
          FAST_CHECKS: ${{ needs.fast-checks.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          GO_LINT: ${{ needs.go-lint.result }}
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fast Checks | $FAST_CHECKS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit Tests | $UNIT_TESTS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Go Lint | $GO_LINT |" >> "$GITHUB_STEP_SUMMARY"
          
          # Exit with failure if critical checks failed
          if [ "$FAST_CHECKS" = "failure" ] || [ "$UNIT_TESTS" = "failure" ]; then
            echo "Critical check failed"
            exit 1
          fi
