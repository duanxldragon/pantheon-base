name: Pull Request Automation

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  governance-prereq:
    name: PR Governance Prereq
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_body_ready: ${{ steps.pr-body-ready.outcome == 'success' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Validate PR governance body
        id: pr-body-ready
        run: node scripts/check-pr-governance.mjs --event "$GITHUB_EVENT_PATH"

  feedback-prereq:
    name: GitHub Feedback Prereq
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      feedback_ready: ${{ steps.feedback-gate.outcome == 'success' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Check GitHub feedback gate
        id: feedback-gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npm run check:github-feedback -- --repo "$GITHUB_REPOSITORY" --pr "$PR_NUMBER"

  automate-solo-pr:
    name: Automate Solo PR
    needs:
      - governance-prereq
      - feedback-prereq
    if: >
      needs.governance-prereq.outputs.pr_body_ready == 'true' &&
      needs.feedback-prereq.outputs.feedback_ready == 'true' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-approve PR (solo mode)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            // Check current review state
            const reviews = await github.rest.pulls.listReviews({
              owner, repo,
              pull_number: prNumber
            });

            const hasApproval = reviews.data.some(
              r => r.state === 'APPROVED' &&
                   (r.user.login === context.payload.pull_request.user.login)
            );

            if (!hasApproval) {
              // Self-approve for solo developer
              await github.rest.pulls.createReview({
                owner, repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: 'Auto-approved by auto-merge workflow (solo developer mode)'
              });
              console.log(`Self-approved PR #${prNumber}`);
            }

      - name: Enable squash auto-merge
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --auto --squash --delete-branch; then
            echo "Squash auto-merge enabled for PR #${PR_NUMBER}."
          else
            echo "Unable to enable auto-merge for PR #${PR_NUMBER}; continuing without blocking."
          fi
