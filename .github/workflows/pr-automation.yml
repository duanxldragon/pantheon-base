name: Pull Request Automation

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

concurrency:
  group: pr-automation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance-prereq:
    name: PR Governance Prereq
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_body_ready: ${{ steps.pr-body-ready.outcome == 'success' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Validate PR governance body
        id: pr-body-ready
        run: node scripts/check-pr-governance.mjs --event "$GITHUB_EVENT_PATH"

  feedback-prereq:
    name: GitHub Feedback Prereq
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      feedback_ready: ${{ steps.feedback-gate.outcome == 'success' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Check GitHub feedback gate
        id: feedback-gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npm run check:github-feedback -- --repo "$GITHUB_REPOSITORY" --pr "$PR_NUMBER"

  # ============================================================
  # Solo Developer Mode: Auto-merge when ready
  # ============================================================
  automate-solo-pr:
    name: Automate Solo PR
    needs:
      - governance-prereq
      - feedback-prereq
    # Only run on non-draft PRs from this repository
    if: >
      needs.governance-prereq.outputs.pr_body_ready == 'true' &&
      needs.feedback-prereq.outputs.feedback_ready == 'true' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check PR title
        id: check-title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          TITLE="${PR_TITLE:-}"
          # Basic check: ensure PR has a meaningful title
          if [ ${#TITLE} -lt 5 ]; then
            echo "PR title too short: $TITLE"
            exit 1
          fi
          echo "PR title validated (length: ${#TITLE})"
          echo "title_valid=true" >> "$GITHUB_OUTPUT"

      - name: Auto-approve (solo mode)
        if: steps.check-title.outputs.title_valid == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const userLogin = context.payload.pull_request.user.login;

            // Check existing reviews
            const reviews = await github.rest.pulls.listReviews({
              owner, repo,
              pull_number: prNumber
            });

            const hasApproval = reviews.data.some(
              r => r.state === 'APPROVED' && r.user.login === userLogin
            );

            if (!hasApproval) {
              try {
                await github.rest.pulls.createReview({
                  owner, repo,
                  pull_number: prNumber,
                  event: 'APPROVE',
                  body: 'Auto-approved by workflow (solo developer mode)'
                });
                console.log(`Self-approved PR #${prNumber}`);
              } catch (error) {
                // 422 means GitHub Actions bot can't approve - ignore
                if (error.status !== 422) throw error;
                console.log('Bot approval not permitted, skipping');
              }
            }

      - name: Enable squash auto-merge
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --auto --squash --delete-branch; then
            echo "Squash auto-merge enabled for PR #$PR_NUMBER"
          else
            echo "Unable to enable auto-merge (may already be enabled or PR not mergeable)"
          fi

  # ============================================================
  # Draft PR: Notify but don't auto-merge
  # ============================================================
  draft-notify:
    name: Draft PR Handler
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == true
    permissions:
      issues: write
    steps:
      - name: Comment on draft PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: prNumber,
              body: '👋 Draft PR detected. Mark as ready when you want to trigger auto-merge.'
            });
