name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
  merge_group:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Phase 1: Dependency Vulnerabilities
  # ============================================================
  dependency-vulnerabilities:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          package-manager-cache: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Report Go vulnerabilities
        id: govulncheck
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 -json ./... > security-reports/govulncheck.json

      - name: Report npm vulnerabilities (root)
        id: npm-audit-root
        continue-on-error: true
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > security-reports/npm-audit-root.json || true

      - name: Report npm vulnerabilities (frontend)
        id: npm-audit-frontend
        continue-on-error: true
        working-directory: frontend
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > ../security-reports/npm-audit-frontend.json || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-dependency-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce gate
        if: always()
        shell: bash
        env:
          GOVULNCHECK_RESULT: ${{ steps.govulncheck.outcome }}
          NPM_AUDIT_ROOT_RESULT: ${{ steps.npm-audit-root.outcome }}
          NPM_AUDIT_FRONTEND_RESULT: ${{ steps.npm-audit-frontend.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "## Dependency Vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| govulncheck | $GOVULNCHECK_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm audit (root) | $NPM_AUDIT_ROOT_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm audit (frontend) | $NPM_AUDIT_FRONTEND_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          
          # PR/merge_group: report-only mode until existing issues are remediated
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            echo "Report-only mode for PR/merge_group"
            exit 0
          fi
          
          # Main/Release: enforce
          if [ "$GOVULNCHECK_RESULT" != "success" ] || \
             [ "$NPM_AUDIT_ROOT_RESULT" != "success" ] || \
             [ "$NPM_AUDIT_FRONTEND_RESULT" != "success" ]; then
            exit 1
          fi

  # ============================================================
  # Phase 2: Secret Scanning
  # ============================================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Detect leaked secrets
        id: gitleaks
        continue-on-error: true
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail
          log_opts=()
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_BASE_SHA" ] && [ -n "$PR_HEAD_SHA" ]; then
            log_opts=(--log-opts="$PR_BASE_SHA..$PR_HEAD_SHA")
          elif [ "$EVENT_NAME" = "merge_group" ] && [ -n "$MERGE_GROUP_BASE_SHA" ] && [ -n "$MERGE_GROUP_HEAD_SHA" ]; then
            log_opts=(--log-opts="$MERGE_GROUP_BASE_SHA..$MERGE_GROUP_HEAD_SHA")
          fi

          go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect \
            --source . \
            "${log_opts[@]}" \
            --redact \
            --report-format json \
            --report-path security-reports/gitleaks.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-secret-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce gate
        if: always()
        shell: bash
        env:
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
        run: |
          echo "gitleaks: $GITLEAKS_RESULT"
          # Secret scanning is always enforced - leaked secrets are critical
          if [ "$GITLEAKS_RESULT" != "success" ]; then
            echo "Leaked secrets detected!"
            exit 1
          fi

  # ============================================================
  # Phase 3: Workflow Security (zizmor)
  # ============================================================
  workflow-security:
    name: Workflow Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.x"

      - name: Run zizmor security scan
        id: zizmor
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install --user zizmor==1.25.2
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/zizmor" --format json .github/workflows > security-reports/zizmor.json || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-workflow-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce gate
        if: always()
        shell: bash
        env:
          ZIZMOR_RESULT: ${{ steps.zizmor.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "## Workflow Security (zizmor)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: $ZIZMOR_RESULT" >> "$GITHUB_STEP_SUMMARY"
          
          # PR/merge_group: report-only until issues are remediated
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "merge_group" ]; then
            echo "Report-only mode for PR/merge_group"
            exit 0
          fi
          
          # Main/Release: enforce high/critical issues
          if [ "$ZIZMOR_RESULT" != "success" ]; then
            # Check if there are high/critical issues
            high_critical=$(jq '[.[] | select(.level == "error" or .level == "warning")] | length' security-reports/zizmor.json 2>/dev/null || echo "0")
            if [ "$high_critical" -gt 0 ]; then
              echo "High/critical workflow security issues found: $high_critical"
              exit 1
            fi
          fi

  # ============================================================
  # Phase 4: CodeQL Security Scan
  # ============================================================
  codeql-scan:
    name: CodeQL Security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: go, typescript
          queries: security-extended

      - name: Perform Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: "/language:go,typescript"
          upload: true

  # ============================================================
  # Phase 5: Summary
  # ============================================================
  security-summary:
    name: Security Summary
    needs: [dependency-vulnerabilities, secret-scan, workflow-security, codeql-scan]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate summary
        shell: bash
        env:
          DEP_VULN: ${{ needs.dependency-vulnerabilities.result }}
          SECRET_SCAN: ${{ needs.secret-scan.result }}
          WORKFLOW_SEC: ${{ needs.workflow-security.result }}
          CODEQL: ${{ needs.codeql-scan.result }}
        run: |
          echo "## Security Gates Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Vulnerabilities | $DEP_VULN |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Scan | $SECRET_SCAN |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow Security | $WORKFLOW_SEC |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CodeQL Scan | $CODEQL |" >> "$GITHUB_STEP_SUMMARY"
