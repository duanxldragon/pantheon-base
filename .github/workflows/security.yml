name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
  merge_group:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  dependency-vulnerabilities:
    name: Dependency Vulnerabilities
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          package-manager-cache: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Report Go vulnerabilities
        id: govulncheck
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -json ./... > security-reports/govulncheck.json

      - name: Report root npm vulnerabilities
        id: npm-audit-root
        continue-on-error: true
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > security-reports/npm-audit-root.json

      - name: Report frontend npm vulnerabilities
        id: npm-audit-frontend
        continue-on-error: true
        working-directory: frontend
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > ../security-reports/npm-audit-frontend.json

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-dependency-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce dependency vulnerability gate
        if: always()
        shell: bash
        env:
          GOVULNCHECK_RESULT: ${{ steps.govulncheck.outcome }}
          NPM_AUDIT_ROOT_RESULT: ${{ steps.npm-audit-root.outcome }}
          NPM_AUDIT_FRONTEND_RESULT: ${{ steps.npm-audit-frontend.outcome }}
        run: |
          echo "govulncheck: ${GOVULNCHECK_RESULT}"
          echo "npm audit (root): ${NPM_AUDIT_ROOT_RESULT}"
          echo "npm audit (frontend): ${NPM_AUDIT_FRONTEND_RESULT}"
          if [ "${GOVULNCHECK_RESULT}" != "success" ] || \
             [ "${NPM_AUDIT_ROOT_RESULT}" != "success" ] || \
             [ "${NPM_AUDIT_FRONTEND_RESULT}" != "success" ]; then
            exit 1
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Report leaked secrets
        id: gitleaks
        continue-on-error: true
        run: go run github.com/zricethezav/gitleaks/v8@latest detect --no-git --source . --redact --report-format json --report-path security-reports/gitleaks.json

      - name: Upload secret reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-secret-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce secret scan gate
        if: always()
        shell: bash
        env:
          GITLEAKS_RESULT: ${{ steps.gitleaks.outcome }}
        run: |
          echo "gitleaks: ${GITLEAKS_RESULT}"
          if [ "${GITLEAKS_RESULT}" != "success" ]; then
            exit 1
          fi

  workflow-posture:
    name: Workflow Posture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.x"

      - name: Report workflow risks with zizmor
        id: zizmor
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install --user zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/zizmor" --format json .github/workflows > security-reports/zizmor.json

      - name: Upload workflow posture reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-workflow-posture-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce workflow posture gate
        if: always()
        shell: bash
        env:
          ZIZMOR_RESULT: ${{ steps.zizmor.outcome }}
        run: |
          echo "zizmor: ${ZIZMOR_RESULT}"
          if [ "${ZIZMOR_RESULT}" != "success" ]; then
            exit 1
          fi

  codeql-security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: go, typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: "/language:go,typescript"

  security-gates:
    name: Security Gates
    needs:
      - secret-scan
      - workflow-posture
      - codeql-security
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce security results
        shell: bash
        env:
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          WORKFLOW_POSTURE_RESULT: ${{ needs.workflow-posture.result }}
          CODEQL_SECURITY_SCAN_RESULT: ${{ needs.codeql-security.result }}
        run: |
          echo "Secret Scan: ${SECRET_SCAN_RESULT}"
          echo "Workflow Posture: ${WORKFLOW_POSTURE_RESULT}"
          echo "CodeQL Security Scan: ${CODEQL_SECURITY_SCAN_RESULT}"
          if [ "${SECRET_SCAN_RESULT}" != "success" ] || \
             [ "${WORKFLOW_POSTURE_RESULT}" != "success" ] || \
             [ "${CODEQL_SECURITY_SCAN_RESULT}" != "success" ]; then
            exit 1
          fi
