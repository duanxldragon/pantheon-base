name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
  merge_group:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  dependency-vulnerabilities:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Report Go vulnerabilities
        id: govulncheck
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -json ./... > security-reports/govulncheck.json

      - name: Report root npm vulnerabilities
        id: npm-audit-root
        continue-on-error: true
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > security-reports/npm-audit-root.json

      - name: Report frontend npm vulnerabilities
        id: npm-audit-frontend
        continue-on-error: true
        working-directory: frontend
        run: |
          npm ci
          npm audit --registry=https://registry.npmjs.org --json --audit-level=high > ../security-reports/npm-audit-frontend.json

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-dependency-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce dependency vulnerability gate
        if: always()
        shell: bash
        run: |
          echo "govulncheck: ${{ steps.govulncheck.outcome }}"
          echo "npm audit (root): ${{ steps.npm-audit-root.outcome }}"
          echo "npm audit (frontend): ${{ steps.npm-audit-frontend.outcome }}"
          if [ "${{ steps.govulncheck.outcome }}" != "success" ] || \
             [ "${{ steps.npm-audit-root.outcome }}" != "success" ] || \
             [ "${{ steps.npm-audit-frontend.outcome }}" != "success" ]; then
            exit 1
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Report leaked secrets
        id: gitleaks
        continue-on-error: true
        run: go run github.com/zricethezav/gitleaks/v8@latest detect --source . --redact --report-format json --report-path security-reports/gitleaks.json

      - name: Upload secret reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-secret-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce secret scan gate
        if: always()
        shell: bash
        run: |
          echo "gitleaks: ${{ steps.gitleaks.outcome }}"
          if [ "${{ steps.gitleaks.outcome }}" != "success" ]; then
            exit 1
          fi

  workflow-posture:
    name: Workflow Posture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Report workflow risks with zizmor
        id: zizmor
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install --user zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/zizmor" --format json .github/workflows > security-reports/zizmor.json

      - name: Upload workflow posture reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-workflow-posture-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Enforce workflow posture gate
        if: always()
        shell: bash
        run: |
          echo "zizmor: ${{ steps.zizmor.outcome }}"
          if [ "${{ steps.zizmor.outcome }}" != "success" ]; then
            exit 1
          fi

  codeql-security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go, typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go,typescript"

  security-gates:
    name: Security Gates
    needs:
      - dependency-vulnerabilities
      - secret-scan
      - workflow-posture
      - codeql-security
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce security results
        shell: bash
        run: |
          echo "Dependency Vulnerabilities: ${{ needs.dependency-vulnerabilities.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "Workflow Posture: ${{ needs.workflow-posture.result }}"
          echo "CodeQL Security Scan: ${{ needs.codeql-security.result }}"
          if [ "${{ needs.dependency-vulnerabilities.result }}" != "success" ] || \
             [ "${{ needs.secret-scan.result }}" != "success" ] || \
             [ "${{ needs.workflow-posture.result }}" != "success" ] || \
             [ "${{ needs.codeql-security.result }}" != "success" ]; then
            exit 1
          fi