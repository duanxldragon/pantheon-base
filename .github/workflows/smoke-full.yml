name: Full Smoke Suite

on:
  schedule:
    - cron: "37 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-full-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  GO_VERSION_FILE: backend/go.mod
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_DATABASE: "pantheon_base"

jobs:
  smoke-full:
    name: Full Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pantheon_base
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      PANTHEON_DSN: "root:root@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC"
      PANTHEON_TEST_DSN: "root:root@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC"
      PANTHEON_REDIS_ADDR: 127.0.0.1:6379
      PANTHEON_WORKSPACE_ROOT: ${{ github.workspace }}
      PANTHEON_PORT: "8080"
      PANTHEON_API_BASE_URL: http://127.0.0.1:8080/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        shell: bash
        working-directory: backend
        run: |
          nohup go run ./cmd/server >"$RUNNER_TEMP/pantheon-backend.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/pantheon-backend.pid"

      - name: Wait for backend health
        shell: bash
        run: |
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time." >&2
          cat "$RUNNER_TEMP/pantheon-backend.log" >&2 || true
          exit 1

      - name: Run full smoke suite
        working-directory: frontend
        run: npm run test:smoke:all

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: smoke-full-artifacts
          path: |
            frontend/test-results
            ${{ runner.temp }}/pantheon-backend.log
          if-no-files-found: ignore

      - name: Stop backend
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/pantheon-backend.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/pantheon-backend.pid")" || true
          fi
