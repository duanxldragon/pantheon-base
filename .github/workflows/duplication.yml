name: Duplication Gate

on:
  workflow_dispatch:

jobs:
  duplication-gate:
    name: Duplication Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          package-manager-cache: false

      - name: Run duplication scan
        id: duplication
        continue-on-error: true
        shell: bash
        run: npm run check:duplication -- --json > duplication-report.json

      - name: Upload duplication report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: duplication-report
          path: duplication-report.json
          if-no-files-found: warn

      - name: Enforce duplication gate
        if: always()
        shell: bash
        env:
          DUPLICATION_RESULT: ${{ steps.duplication.outcome }}
        run: |
          echo "duplication: ${DUPLICATION_RESULT}"
          if [ "${DUPLICATION_RESULT}" != "success" ]; then
            exit 1
          fi
