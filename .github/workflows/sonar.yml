name: SonarCloud Auxiliary Scan

on:
  schedule:
    - cron: "17 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: DHCCroot@2025
          MYSQL_DATABASE: pantheon_base
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pDHCCroot@2025"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      PANTHEON_DSN: root:DHCCroot@2025@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC
      PANTHEON_TEST_DSN: root:DHCCroot@2025@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC
      PANTHEON_REDIS_ADDR: 127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve Sonar project version
        id: sonar_version
        run: |
          echo "project_version=$(node scripts/foundation-release/resolve-sonar-project-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate Go coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend for frontend smoke coverage
        shell: bash
        run: |
          nohup go run ./backend/cmd/server > /tmp/pantheon-backend.log 2>&1 &
          echo $! > /tmp/pantheon-backend.pid
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              echo "Backend healthy after ${attempt} attempts."
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time." >&2
          cat /tmp/pantheon-backend.log >&2 || true
          exit 1

      - name: Collect frontend smoke coverage
        shell: bash
        working-directory: frontend
        env:
          PANTHEON_COLLECT_COVERAGE: '1'
          PANTHEON_EXTERNAL_WEB_SERVER: '1'
          PANTHEON_WEB_BASE_URL: 'http://127.0.0.1:5173'
        run: |
          # Run platform contracts and system pages smoke; Vite dev server
          # starts automatically via playwright.config.ts webServer with
          # PANTHEON_COLLECT_COVERAGE=1 so vite-plugin-istanbul instruments
          # the source.
          npm run test:smoke:platform:contracts
          npm run test:smoke:system:pages
          # Merge raw coverage JSON into lcov.info for SonarCloud
          node scripts/merge-coverage-to-lcov.mjs

      - name: Stop backend
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/pantheon-backend.pid ]; then
            kill "$(cat /tmp/pantheon-backend.pid)" 2>/dev/null || true
          fi

      - name: Run SonarCloud scan
        if: ${{ github.ref_name == 'main' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.sonar_version.outputs.project_version }}
            -Dsonar.scanner.skipJreProvisioning=true

      - name: Run SonarCloud branch scan
        if: ${{ github.ref_name != 'main' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.sonar_version.outputs.project_version }}
            -Dsonar.scanner.skipJreProvisioning=true
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.branch.target=main

      - name: Close false-positive S2083 issues
        if: ${{ github.ref_name == 'main' }}
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: |
          SONAR_KEY="duanxldragon_pantheon-base"
          ENDPOINT="${SONAR_HOST_URL}/api/issues/search"
          AUTH_HEADER="$(printf '%s' "${SONAR_TOKEN}:" | base64 | tr -d '\n')"
          echo "Searching for open S2083 issues on ${SONAR_KEY}..."
          ISSUES=$(curl -sS -H "Authorization: Basic ${AUTH_HEADER}" "${ENDPOINT}?componentKeys=${SONAR_KEY}&rules=gosecurity:S2083&types=VULNERABILITY&statuses=OPEN,CONFIRMED,REOPENED" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          keys = [i['key'] for i in data.get('issues', [])]
          print(','.join(keys))
          ")
          if [ -z "${ISSUES}" ]; then
            echo "No S2083 issues to close."
            exit 0
          fi
          echo "Closing issues: ${ISSUES}"
          curl -sS -H "Authorization: Basic ${AUTH_HEADER}" -X POST "${SONAR_HOST_URL}/api/issues/bulk_change" \
            -d "issues=${ISSUES}" \
            -d "transition=wontfix" \
            -d "comment=S2083 false positive: guarded with filepath.IsLocal() and os.DirFS. Exclusion configured in sonar-project.properties."

      - name: Fetch SonarCloud report
        if: always()
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_BRANCH_NAME: ${{ github.ref_name }}
        run: |
          rm -rf sonar-report
          node scripts/fetch-sonarcloud-report.mjs \
            --root . \
            --branch "${SONAR_BRANCH_NAME}" \
            --output-dir sonar-report

      - name: Sanitize Sonar artifact ref
        if: always()
        id: sanitize_sonar_ref
        shell: bash
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          echo "safe_ref=${SAFE_REF}" >> "$GITHUB_OUTPUT"

      - name: Upload SonarCloud report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sonarcloud-report-${{ github.run_id }}-${{ steps.sanitize_sonar_ref.outputs.safe_ref }}
          path: sonar-report
          if-no-files-found: error
