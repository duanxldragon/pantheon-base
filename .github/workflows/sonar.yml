name: SonarCloud Auxiliary Scan

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve Sonar project version
        id: sonar_version
        run: |
          echo "project_version=$(node scripts/foundation-release/resolve-sonar-project-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate Go coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Run SonarCloud scan
        if: ${{ github.ref_name == 'main' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.sonar_version.outputs.project_version }}
            -Dsonar.scanner.skipJreProvisioning=true

      - name: Run SonarCloud branch scan
        if: ${{ github.ref_name != 'main' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.sonar_version.outputs.project_version }}
            -Dsonar.scanner.skipJreProvisioning=true
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.branch.target=main
