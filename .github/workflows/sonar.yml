name: SonarCloud Auxiliary Scan

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: DHCCroot@2025
          MYSQL_DATABASE: pantheon_base
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pDHCCroot@2025"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      PANTHEON_TEST_DSN: root:DHCCroot@2025@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC
      PANTHEON_REDIS_ADDR: 127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve Sonar project version
        id: sonar_version
        run: |
          echo "project_version=$(node scripts/foundation-release/resolve-sonar-project-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate Go coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Run SonarCloud scan
        if: ${{ github.ref_name == 'main' }}
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.sonar_version.outputs.project_version }}
            -Dsonar.scanner.skipJreProvisioning=true

      - name: Run SonarCloud branch scan
        if: ${{ github.ref_name != 'main' }}
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.sonar_version.outputs.project_version }}
            -Dsonar.scanner.skipJreProvisioning=true
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.branch.target=main
