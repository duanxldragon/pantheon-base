name: SonarQube Full Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/**
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "*.txt"

permissions:
  contents: read

env:
  GO_VERSION_FILE: go.mod

jobs:
  # ============================================================
  # Primary Quality Gate: SonarQube Full Analysis
  # ============================================================

  sonar-analysis:
    name: SonarQube Full Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Sonar configuration
        id: sonar-config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets not configured. Skipping analysis."
          fi

      - name: Detect SonarCloud autoscan mode
        id: sonar-mode
        if: steps.sonar-config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: duanxldragon_pantheon-base
        run: |
          response="$(curl -fsS -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/settings/values?component=${SONAR_PROJECT_KEY}&keys=sonar.autoscan.enabled")"
          if echo "$response" | grep -q '"value":"true"'; then
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud automatic analysis is enabled; skipping CI scanner."
          else
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
            echo "SonarCloud automatic analysis is disabled; running CI scanner."
          fi

      - name: Checkout
        if: steps.sonar-mode.outputs.run_scan == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        if: steps.sonar-mode.outputs.run_scan == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Generate Go coverage
        if: steps.sonar-mode.outputs.run_scan == 'true'
        run: go test -coverprofile=coverage.out ./...

      - name: SonarQube scan
        if: steps.sonar-mode.outputs.run_scan == 'true'
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Report local analysis info
        if: steps.sonar-config.outputs.enabled != 'true' || steps.sonar-mode.outputs.run_scan != 'true'
        run: |
          echo "============================================"
          echo "  SonarQube Analysis Skipped"
          echo "============================================"
          if [ "${{ steps.sonar-config.outputs.enabled }}" != "true" ]; then
            echo "Reason: SONAR_TOKEN or SONAR_HOST_URL not configured"
          else
            echo "Reason: SonarCloud automatic analysis is enabled"
          fi
          echo ""
          echo "To run SonarQube CI analysis:"
          echo "  1. Set SONAR_TOKEN secret in repository settings"
          echo "  2. Set SONAR_HOST_URL secret (e.g., https://sonarcloud.io)"
          echo "  3. Disable SonarCloud automatic analysis for this project"
          echo ""
          echo "For local analysis, run:"
          echo "  ./scripts/run-sonar.ps1"
          echo "============================================"
