name: Lint Workflows

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: lint-workflows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.10
          ACTIONLINT_SHA256: f4c76b71db5755a713e6055cbb0857ed07e103e028bda117817660ebadb4386f
        run: |
          curl -sSfL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint

      - name: Run actionlint
        run: ./actionlint -color -shellcheck=""

      - name: Write summary
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "## Workflow Lint" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Status: $JOB_STATUS" >> "$GITHUB_STEP_SUMMARY"
          if [ "$JOB_STATUS" = "success" ]; then
            echo "All workflow files passed validation." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Workflow validation failed. See logs above." >> "$GITHUB_STEP_SUMMARY"
          fi
