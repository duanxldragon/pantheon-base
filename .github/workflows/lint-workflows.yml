name: Lint Workflows

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: lint-workflows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version: '1.26.5'
          cache: false

      - name: Install actionlint
        shell: bash
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.10

      - name: Run actionlint
        run: actionlint -color -shellcheck=""

      - name: Write summary
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "## Workflow Lint" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Status: $JOB_STATUS" >> "$GITHUB_STEP_SUMMARY"
          if [ "$JOB_STATUS" = "success" ]; then
            echo "All workflow files passed validation." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Workflow validation failed. See logs above." >> "$GITHUB_STEP_SUMMARY"
          fi
