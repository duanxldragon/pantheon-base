name: Quality Gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - release/**
  merge_group:

env:
  NODE_VERSION: "22"
  GO_VERSION_FILE: go.mod

jobs:
  docs-governance:
    name: Docs Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Check docs frontmatter
        run: npm run check:docs-frontmatter

      - name: Check task packet template
        run: npm run check:task-packet-template

      - name: Check generated modules
        run: npm run check:generated-modules

  frontend-contract:
    name: Frontend Contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check menu contract
        working-directory: frontend
        run: npm run check:menu-contract

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Test backend
        run: go test -race ./...

  automation-contracts:
    name: Automation Contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test automation scripts
        run: node --test tests/scripts/check-duplication.test.mjs frontend/scripts/run-smoke-suite.test.mjs frontend/scripts/cleanup-generated-modules.test.mjs

  quality-gates:
    name: Quality Gates
    needs:
      - docs-governance
      - frontend-contract
      - backend-tests
      - automation-contracts
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce quality results
        shell: bash
        run: |
          echo "Docs Governance: ${{ needs.docs-governance.result }}"
          echo "Frontend Contract: ${{ needs.frontend-contract.result }}"
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Automation Contracts: ${{ needs.automation-contracts.result }}"
          if [ "${{ needs.docs-governance.result }}" != "success" ] || \
             [ "${{ needs.frontend-contract.result }}" != "success" ] || \
             [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.automation-contracts.result }}" != "success" ]; then
            exit 1
          fi