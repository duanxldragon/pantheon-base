name: Code Quality Gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - release/**
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  GO_VERSION_FILE: backend/go.mod
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_DATABASE: "pantheon_base"

jobs:
  # ============================================================
  # Phase 1: Fast Checks (Merge Group / PR)
  # ============================================================

  change-scope:
    name: Change Scope
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_only: ${{ steps.scope.outputs.all_count != '' && steps.scope.outputs.all_count == steps.scope.outputs.docs_only_count }}
      governance_only: ${{ steps.scope.outputs.all_count != '' && steps.scope.outputs.all_count == steps.scope.outputs.governance_only_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Detect docs-only pull requests
        id: scope
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        with:
          filters: |
            all:
              - '**'
            docs_only:
              - 'README.md'
              - 'README.en.md'
              - 'DESIGN.md'
              - 'SECURITY.md'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - 'docs/**'
            governance_only:
              - 'README.md'
              - 'README.en.md'
              - 'DESIGN.md'
              - 'SECURITY.md'
              - 'AGENTS.md'
              - 'AGENTS.en.md'
              - 'CLAUDE.md'
              - '.agents/**'
              - '.github/pull_request_template.md'
              - '.github/PULL_REQUEST_TEMPLATE.md'
              - '.github/pr-body.txt'
              - '.github/workflows/**'
              - '.harness/**'
              - 'config/method.config.json'
              - 'docs/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/check-pr-governance.mjs'
              - 'scripts/check-task-packet-template.mjs'
              - 'scripts/cleanup-github-branches.mjs'
              - 'scripts/collect-merge-targets.mjs'
              - 'scripts/execute-merge.mjs'
              - 'scripts/frontmatter-check.mjs'
              - 'scripts/harness/**'
              - 'tests/scripts/**'

  docs-governance:
    name: Docs Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Checkout Pantheon Harness
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: duanxldragon/pantheon-harness
          path: pantheon-harness
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Check docs frontmatter
        run: npm run check:docs-frontmatter

      - name: Check task packet template
        run: npm run check:task-packet-template

      - name: Check PR governance template
        run: npm run check:pr-governance

      - name: Validate PR governance body
        # Heavy ceremony (full template + harness artifact linkage) is enforced for
        # agent PRs but skipped when the maintainer labels the PR `solo-override`.
        # Cheap structural checks (frontmatter, task-packet, PR template) still run above.
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'solo-override')
        run: node scripts/check-pr-governance.mjs --event "$GITHUB_EVENT_PATH"

      - name: Check failure registry
        id: failure-registry
        continue-on-error: true
        run: npm run check:failure-registry

      - name: Check harness method linkage
        id: harness-method
        continue-on-error: true
        run: npm run check:harness-method

      - name: Check harness adoption
        id: harness-adoption
        continue-on-error: true
        run: npm run check:harness-adoption

      - name: Check harness template health
        id: harness-template
        continue-on-error: true
        run: npm run check:harness-template

      - name: Check harness docs
        id: harness-docs
        continue-on-error: true
        run: npm run check:harness-docs

      - name: Check harness inventory
        id: harness-inventory
        continue-on-error: true
        run: npm run check:harness-inventory

      - name: Check harness sync drift
        id: harness-sync
        continue-on-error: true
        run: npm run check:harness-sync

      - name: Check generated modules
        id: generated-modules
        continue-on-error: true
        run: npm run check:generated-modules

      - name: Enforce harness governance gate
        if: always()
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          FAILURE_REGISTRY_RESULT: ${{ steps.failure-registry.outcome }}
          HARNESS_METHOD_RESULT: ${{ steps.harness-method.outcome }}
          HARNESS_ADOPTION_RESULT: ${{ steps.harness-adoption.outcome }}
          HARNESS_TEMPLATE_RESULT: ${{ steps.harness-template.outcome }}
          HARNESS_DOCS_RESULT: ${{ steps.harness-docs.outcome }}
          HARNESS_INVENTORY_RESULT: ${{ steps.harness-inventory.outcome }}
          HARNESS_SYNC_RESULT: ${{ steps.harness-sync.outcome }}
          GENERATED_MODULES_RESULT: ${{ steps.generated-modules.outcome }}
        run: |
          # Report harness check results
          echo "## Harness Governance Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          printf '| Failure Registry | %s |\n' "$FAILURE_REGISTRY_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Harness Method | %s |\n' "$HARNESS_METHOD_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Harness Adoption | %s |\n' "$HARNESS_ADOPTION_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Harness Template | %s |\n' "$HARNESS_TEMPLATE_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Harness Docs | %s |\n' "$HARNESS_DOCS_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Harness Inventory | %s |\n' "$HARNESS_INVENTORY_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Harness Sync | %s |\n' "$HARNESS_SYNC_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Generated Modules | %s |\n' "$GENERATED_MODULES_RESULT" >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "Harness governance check results:"
          echo "  Failure Registry: ${FAILURE_REGISTRY_RESULT}"
          echo "  Harness Method: ${HARNESS_METHOD_RESULT}"
          echo "  Harness Adoption: ${HARNESS_ADOPTION_RESULT}"
          echo "  Harness Template: ${HARNESS_TEMPLATE_RESULT}"
          echo "  Harness Docs: ${HARNESS_DOCS_RESULT}"
          echo "  Harness Inventory: ${HARNESS_INVENTORY_RESULT}"
          echo "  Harness Sync: ${HARNESS_SYNC_RESULT}"
          echo "  Generated Modules: ${GENERATED_MODULES_RESULT}"

          # For PR and merge_group: harness checks are report-only (not blocking)
          # For push to main/release: enforce strict harness gate
          if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "merge_group" ]; then
            echo ""
            echo "Harness checks are report-only for PR and merge_group events."
            echo "Strict enforcement applies only to main/release pushes."
            exit 0
          fi

          # Enforce strict gate for main/release pushes
          if [ "${FAILURE_REGISTRY_RESULT}" != "success" ] || \
             [ "${HARNESS_METHOD_RESULT}" != "success" ] || \
             [ "${HARNESS_ADOPTION_RESULT}" != "success" ] || \
             [ "${HARNESS_TEMPLATE_RESULT}" != "success" ] || \
             [ "${HARNESS_DOCS_RESULT}" != "success" ] || \
             [ "${HARNESS_INVENTORY_RESULT}" != "success" ] || \
             [ "${HARNESS_SYNC_RESULT}" != "success" ] || \
             [ "${GENERATED_MODULES_RESULT}" != "success" ]; then
            exit 1
          fi

  frontend-contract:
    name: Frontend Contract
    needs:
      - change-scope
    if: ${{ github.event_name == 'merge_group' || needs.change-scope.outputs.governance_only != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check menu contract
        working-directory: frontend
        run: npm run check:menu-contract

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-tests:
    name: Backend Tests
    needs:
      - change-scope
    if: ${{ github.event_name == 'merge_group' || needs.change-scope.outputs.governance_only != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pantheon_base
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      PANTHEON_TEST_DSN: "root:root@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC"
      PANTHEON_REDIS_ADDR: 127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Test backend
        working-directory: backend
        run: go test -race ./...

  go-lint:
    name: Go Lint
    needs:
      - change-scope
    if: ${{ github.event_name == 'merge_group' || needs.change-scope.outputs.governance_only != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.2

      - name: Run golangci-lint
        id: golangci-lint
        continue-on-error: true
        working-directory: backend
        run: golangci-lint run ./...

      - name: Enforce go-lint gate
        if: always()
        shell: bash
        env:
          GOLANGCI_LINT_RESULT: ${{ steps.golangci-lint.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "golangci-lint: ${GOLANGCI_LINT_RESULT}"
          echo "event: ${EVENT_NAME}"
          if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "merge_group" ]; then
            echo "Go lint is report-only for PR and merge_group until existing findings are remediated."
            exit 0
          fi
          if [ "${GOLANGCI_LINT_RESULT}" != "success" ]; then
            exit 1
          fi

  duplication:
    name: Duplication Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Run duplication scan
        id: duplication
        continue-on-error: true
        shell: bash
        run: npm run check:duplication -- --json > duplication-report.json

      - name: Upload duplication report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: duplication-report
          path: duplication-report.json
          if-no-files-found: warn

      - name: Enforce duplication gate
        if: always()
        shell: bash
        env:
          DUPLICATION_RESULT: ${{ steps.duplication.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "duplication: ${DUPLICATION_RESULT}"
          echo "event: ${EVENT_NAME}"
          if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "merge_group" ]; then
            echo "Duplication is report-only for PR and merge_group until a new-code duplication gate exists."
            exit 0
          fi
          if [ "${DUPLICATION_RESULT}" != "success" ]; then
            exit 1
          fi

  smoke-sanity:
    name: Smoke Sanity
    needs:
      - change-scope
    if: ${{ github.event_name == 'merge_group' || needs.change-scope.outputs.governance_only != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pantheon_base
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      PANTHEON_DSN: "root:root@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC"
      PANTHEON_TEST_DSN: "root:root@tcp(127.0.0.1:3306)/pantheon_base?charset=utf8mb4&parseTime=True&loc=UTC"
      PANTHEON_REDIS_ADDR: 127.0.0.1:6379
      PANTHEON_WORKSPACE_ROOT: ${{ github.workspace }}
      PANTHEON_PORT: "8080"
      PANTHEON_API_BASE_URL: http://127.0.0.1:8080/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        shell: bash
        working-directory: backend
        run: |
          nohup go run ./cmd/server >"$RUNNER_TEMP/pantheon-backend.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/pantheon-backend.pid"

      - name: Wait for backend health
        shell: bash
        run: |
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time." >&2
          cat "$RUNNER_TEMP/pantheon-backend.log" >&2 || true
          exit 1

      - name: Run smoke sanity suite
        working-directory: frontend
        run: npm run test:smoke:platform:contracts && npm run test:smoke:system:pages

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: smoke-sanity-artifacts
          path: |
            frontend/test-results
            ${{ runner.temp }}/pantheon-backend.log
          if-no-files-found: ignore

      - name: Stop backend
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/pantheon-backend.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/pantheon-backend.pid")" || true
          fi

  quality-gates:
    name: Quality Gates
    needs:
      - change-scope
      - docs-governance
      - frontend-contract
      - backend-tests
      - go-lint
      - duplication
      - smoke-sanity
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce quality results
        shell: bash
        env:
          DOCS_ONLY: ${{ needs.change-scope.outputs.docs_only }}
          GOVERNANCE_ONLY: ${{ needs.change-scope.outputs.governance_only }}
          DOCS_GOVERNANCE_RESULT: ${{ needs.docs-governance.result }}
          FRONTEND_CONTRACT_RESULT: ${{ needs.frontend-contract.result }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
          GO_LINT_RESULT: ${{ needs.go-lint.result }}
          DUPLICATION_RESULT: ${{ needs.duplication.result }}
          SMOKE_SANITY_RESULT: ${{ needs.smoke-sanity.result }}
          SOLO_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'solo-override') }}
        run: |
          # Maintainer escape hatch: a PR labelled `solo-override` treats every gate
          # as advisory so the solo human is never blocked. Agents must not self-apply
          # this label — see AGENTS.md. Real quality signals still run and stay visible.
          if [ "${SOLO_OVERRIDE}" = "true" ]; then
            echo "::notice::solo-override label present — maintainer bypass; quality gates advisory for this PR"
            {
              echo "## Quality Gates Summary"
              echo ""
              echo "Bypassed via \`solo-override\` label (maintainer). Gate results are advisory for this PR."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          RUNTIME_GATES_REQUIRED=true
          if [ "${GOVERNANCE_ONLY}" = "true" ]; then
            RUNTIME_GATES_REQUIRED=false
          fi
          echo "## Quality Gates Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          printf '| Docs Governance | %s |\n' "$DOCS_GOVERNANCE_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Frontend Contract | %s |\n' "$FRONTEND_CONTRACT_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Backend Tests | %s |\n' "$BACKEND_TESTS_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Go Lint | %s |\n' "$GO_LINT_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Duplication Gate | %s |\n' "$DUPLICATION_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Smoke Sanity | %s |\n' "$SMOKE_SANITY_RESULT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Runtime Gates Required | %s |\n' "$RUNTIME_GATES_REQUIRED" >> "$GITHUB_STEP_SUMMARY"
          echo "Docs Only: ${DOCS_ONLY}"
          echo "Governance Only: ${GOVERNANCE_ONLY}"
          echo "Docs Governance: ${DOCS_GOVERNANCE_RESULT}"
          echo "Frontend Contract: ${FRONTEND_CONTRACT_RESULT}"
          echo "Backend Tests: ${BACKEND_TESTS_RESULT}"
          echo "Go Lint: ${GO_LINT_RESULT}"
          echo "Duplication Gate: ${DUPLICATION_RESULT}"
          echo "Smoke Sanity: ${SMOKE_SANITY_RESULT}"
          echo "Runtime Gates Required: ${RUNTIME_GATES_REQUIRED}"
          if [ "${DOCS_GOVERNANCE_RESULT}" != "success" ] || \
             [ "${DUPLICATION_RESULT}" != "success" ]; then
            exit 1
          fi
          if [ "${RUNTIME_GATES_REQUIRED}" = "true" ] && \
             { [ "${FRONTEND_CONTRACT_RESULT}" != "success" ] || \
               [ "${BACKEND_TESTS_RESULT}" != "success" ] || \
               [ "${GO_LINT_RESULT}" != "success" ] || \
               [ "${SMOKE_SANITY_RESULT}" != "success" ]; }; then
            exit 1
          fi
