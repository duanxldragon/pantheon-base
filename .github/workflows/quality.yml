name: Quality Gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - release/**
  merge_group:

env:
  NODE_VERSION: "22"
  GO_VERSION_FILE: go.mod

jobs:
  docs-governance:
    name: Docs Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install root dependencies
        run: npm ci

      - name: Check docs frontmatter
        run: npm run check:docs-frontmatter

      - name: Check task packet template
        run: npm run check:task-packet-template

      - name: Check generated modules
        run: npm run check:generated-modules

  frontend-contract:
    name: Frontend Contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check menu contract
        working-directory: frontend
        run: npm run check:menu-contract

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: Test backend
        run: go test -race ./...

  automation-contracts:
    name: Automation Contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Test automation scripts
        run: node --test tests/scripts/check-duplication.test.mjs frontend/scripts/run-smoke-suite.test.mjs frontend/scripts/cleanup-generated-modules.test.mjs

  quality-gates:
    name: Quality Gates
    needs:
      - docs-governance
      - frontend-contract
      - backend-tests
      - automation-contracts
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enforce quality results
        shell: bash
        env:
          DOCS_GOVERNANCE_RESULT: ${{ needs.docs-governance.result }}
          FRONTEND_CONTRACT_RESULT: ${{ needs.frontend-contract.result }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
          AUTOMATION_CONTRACTS_RESULT: ${{ needs.automation-contracts.result }}
        run: |
          echo "Docs Governance: ${DOCS_GOVERNANCE_RESULT}"
          echo "Frontend Contract: ${FRONTEND_CONTRACT_RESULT}"
          echo "Backend Tests: ${BACKEND_TESTS_RESULT}"
          echo "Automation Contracts: ${AUTOMATION_CONTRACTS_RESULT}"
          if [ "${DOCS_GOVERNANCE_RESULT}" != "success" ] || \
             [ "${FRONTEND_CONTRACT_RESULT}" != "success" ] || \
             [ "${BACKEND_TESTS_RESULT}" != "success" ] || \
             [ "${AUTOMATION_CONTRACTS_RESULT}" != "success" ]; then
            exit 1
          fi
