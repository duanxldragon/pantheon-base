sonar.projectKey=duanxldragon_pantheon-base
sonar.projectName=pantheon-base
sonar.organization=duanxldragon
sonar.sourceEncoding=UTF-8

sonar.sources=backend,frontend,scripts,database
sonar.tests=backend,frontend/tests,tests
sonar.exclusions=**/dist/**,**/node_modules/**,**/.codegraph/**
sonar.test.inclusions=**/*_test.go,**/*.spec.ts,**/*.spec.tsx,**/*.spec.js,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.mjs
# Keep full-repo issue scanning, but exclude locale dictionaries and operational assets
# from coverage/duplication metrics that this workflow cannot measure meaningfully.
sonar.coverage.exclusions=frontend/src/i18n/resources/**/*.ts,frontend/scripts/**,scripts/**,database/**
sonar.cpd.exclusions=frontend/src/i18n/resources/**/*.ts
sonar.issue.ignore.multicriteria=i18nPasswordCopy
sonar.issue.ignore.multicriteria.i18nPasswordCopy.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.i18nPasswordCopy.resourceKey=frontend/src/i18n/resources/**/*.ts

sonar.go.coverage.reportPaths=coverage.out
