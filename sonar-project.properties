sonar.projectKey=duanxldragon_pantheon-base
sonar.projectName=pantheon-base
sonar.organization=duanxldragon
sonar.sourceEncoding=UTF-8

sonar.sources=backend,frontend,scripts,database
sonar.tests=backend,frontend/tests,tests
sonar.exclusions=**/dist/**,**/node_modules/**,**/.codegraph/**
sonar.test.inclusions=**/*_test.go,**/*.spec.ts,**/*.spec.tsx,**/*.spec.js,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.mjs
sonar.coverage.exclusions=**/*_test.go,**/generated/**,**/node_modules/**,**/dist/**,scripts/**,database/**
sonar.cpd.exclusions=**/auth/auth_login_service.go,**/auth/auth_session_service.go,**/auth/auth_mfa_service.go,**/auth/auth_password_service.go,**/auth/auth_overview_service.go

sonar.go.coverage.reportPaths=coverage.out
sonar.typescript.lcov.reportPaths=coverage/frontend/lcov.info

sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3330
sonar.issue.ignore.multicriteria.e1.resourceKey=**/common/cookie.go

# Exclude S7780 (prefer-string-raw) on build-only scripts — \\ escapes for CSS/regex patterns are intentional
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S7780
sonar.issue.ignore.multicriteria.e2.resourceKey=**/frontend/scripts/**

# Exclude S2083 (path-traversal) — guarded with filepath.IsLocal() + os.DirFS
sonar.issue.ignore.multicriteria.e3.ruleKey=gosecurity:S2083
sonar.issue.ignore.multicriteria.e3.resourceKey=**/config/setting/setting_handler.go

sonar.issue.ignore.multicriteria.e4.ruleKey=gosecurity:S2083
sonar.issue.ignore.multicriteria.e4.resourceKey=**/dynamicmodule/dynamic_module_registry.go

# Exclude S2068 on translated i18n resources — these strings intentionally contain the Chinese word "密码".
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e5.resourceKey=frontend/src/i18n/resources/**

# Exclude S2068 on vendored harness scripts — these files are owned upstream in harness-engineering.
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e6.resourceKey=scripts/harness/**
